# Configuration de l'affichage du nom de faction au-dessus du pseudo des joueurs.
# Ce fichier est cree uniquement s'il n'existe pas deja (votre config existante n'est jamais ecrasee).

# Distance (en blocs) au-dela de laquelle un joueur n'est plus mis a jour / affiche pour un autre.
distance: 48

# Frequence de mise a jour de la position/couleur du tag, en ticks (20 ticks = 1 seconde).
update-ticks: 5

# Hauteur du tag de faction au-dessus de la tete du joueur (au-dessus du pseudo).
height-offset: 2.65

# Couleur du nom de faction quand le joueur qui regarde est dans la MEME faction.
own-color: '&a'

# Couleur du nom de faction quand le joueur qui regarde est dans une faction ENNEMIE.
enemy-color: '&c'

# Couleurs pour les autres relations (non demandees explicitement, valeur neutre par defaut).
ally-color: '&f'
truce-color: '&f'
neutral-color: '&f'

# Si false : desactive la couleur differente par joueur (necessite ProtocolLib) et affiche
# toujours own-color pour tout le monde. A utiliser uniquement en depannage.
per-viewer-colors: true

reload-message: '&aLes noms de factions ont ete recharges.'

# Couleur des crochets "[" et "]" entourant le nom de faction (au-dessus de la tete ET dans le
# tchat). Le nom de la faction garde sa propre couleur (selon la relation) ; seuls les crochets
# utilisent cette couleur.
bracket-color: '&8'

# Si false : desactive uniquement l'ajout du badge Top 3 + tag de faction dans le tchat (le tag
# au-dessus de la tete continue de fonctionner normalement). Ne touche jamais au grade/pseudo
# deja affiches par ailleurs dans le tchat. Desactive par defaut ; activable via
# /belariontags chattag on.
chat-tag-enabled: false

# Filtre de tchat SORTANT : retire certains textes indesirables des messages envoyes aux joueurs,
# quelle que soit leur origine (SaberFactions, un autre plugin...). Ne modifie jamais aucun autre
# plugin : on filtre uniquement le paquet reseau juste avant qu'il n'atteigne le client (comme
# pour la couleur des noms de faction ci-dessus).
chat-filter:
  enabled: true
  # Toute ligne de tchat contenant une de ces chaines (recherche insensible a la casse) n'est
  # jamais envoyee au joueur : utile pour supprimer un message entier.
  drop-if-contains:
    - '/setpaypal'
  # Ces chaines sont retirees du texte des lignes qui les contiennent, en gardant le reste de la
  # ligne : utile pour un texte au milieu d'une ligne plus longue (ex: un placeholder de stats).
  strip-substrings:
    - '(faction-kill)'
    - '(faction-death)'

