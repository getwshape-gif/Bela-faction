# Configuration principale de BelarionFactions.
# Ce fichier est cree uniquement s'il n'existe pas deja (votre config existante n'est jamais ecrasee).

prefix: '&8[&8&lBELARION&8] &8» &f'
maximum-membres: 12

couleurs:
  ligne: '&8&m--------------------------------------------------'
  titre: '&8&lAVIS DE RECHERCHE &8— &e%faction%'
  etiquette: '&8'
  valeur: '&f'
  en-ligne: '&e'
  hors-ligne: '&8'

commandes-bloquees:
  - bank
  - money
  - chest
  - ally
  - alliance
  - truce
  - neutral
  - promote
  - demote

messages:
  commande-bloquee: '&8[&8&lBELARION&8] &8» &8Cette commande est interdite sur ces terres.'
  aucune-faction: '&8[&8&lBELARION&8] &8» &eTu ne fais partie d aucune faction.'
  joueur-introuvable: '&8[&8&lBELARION&8] &8» &8Joueur ou faction introuvable.'
  usage-chef: '&8[&8&lBELARION&8] &8» &eUtilisation : &f/f chef <joueur>'
  usage-mod: '&8[&8&lBELARION&8] &8» &eUtilisation : &f/f mod <joueur>'
  points-ajoutes: '&8[&8&lBELARION&8] &8» &e%points% points ont été ajoutés à &f%faction%&e.'
  points-retires: '&8[&8&lBELARION&8] &8» &8%points% points ont été retirés à &f%faction%&8.'
  faction-introuvable-points: '&8[&8&lBELARION&8] &8» &8Faction introuvable.'
  usage-fpoints: '&8[&8&lBELARION&8] &8» &eUtilisation : &f/fpoints <add|remove|set> <faction> <montant>'

# Nouveau : structure d'affichage du Top 3 des factions (branchable sur un futur systeme de points,
# voir com.belarion.factions.points.FactionPointsProvider). Rien ici n'est "invente" comme faux
# systeme de points : ce sont uniquement les points deja stockes dans points-factions.yml, ou
# ajoutes/retires manuellement via /fpoints, en attendant un vrai plugin de points.
top3:
  enabled: true
  badge-top1: '①'
  badge-top2: '②'
  badge-top3: '③'
  color-top1: '&4'
  color-top2: '&5'
  color-top3: '&6'
  header: '&8&m----------&8[ &6Top 3 Factions &8]&8&m----------'
  footer: '&8&m---------------------------------------------------
  no-data: '&7Aucune faction classee pour le moment.'

