name: BelarionFactions
main: com.belarion.factions.BelarionFactionsPlugin
version: '${project.version}'
api-version: '1.13'
author: Belarion
description: >
  Add-on pour SaberFactions : nametags de faction colores selon la relation,
  classement Top 3 des factions (pret pour un futur systeme de points),
  et blocage des sous-commandes /f configure.

# "Factions" est le nom interne (plugin.yml -> name) de SaberFactions : depend obligatoire.
# ProtocolLib est obligatoire pour envoyer une couleur de nametag differente a chaque joueur qui regarde.
depend: [Factions, ProtocolLib]
softdepend: [PlaceholderAPI]

commands:
  topfactions:
    description: Affiche le Top 3 des factions (classement pret pour un futur systeme de points).
    aliases: [ftop, topf]
    usage: /<command>
    permission: belarion.topfactions
  fpoints:
    description: Ajoute/retire des points a une faction (systeme provisoire, en attendant un vrai plugin de points).
    usage: /<command> <add|remove|set> <faction> <montant>
    permission: belarion.points.admin
  belariontags:
    description: Recharge la configuration des nametags de faction.
    usage: /<command> reload
    permission: belarion.tags.admin

permissions:
  belarion.topfactions:
    description: Voir le classement Top 3 des factions.
    default: true
  belarion.points.admin:
    description: Modifier les points d'une faction.
    default: op
  belarion.tags.admin:
    description: Recharger la configuration des nametags de faction.
    default: op

