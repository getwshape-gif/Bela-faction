name: Build BelarionFactions

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Extraire SaberFactions.jar (necessaire pour compiler contre son API publique)
        run: |
          mkdir -p BelarionFactions/libs
          unzip -o -j SaberFactions.zip "SaberFactions.jar" -d BelarionFactions/libs
          test -f BelarionFactions/libs/SaberFactions.jar

      - name: Build with Maven
        run: mvn -B -f BelarionFactions/pom.xml clean package

      - name: Upload built plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: BelarionFactions-jar
          path: BelarionFactions/target/BelarionFactions.jar
          if-no-files-found: error
